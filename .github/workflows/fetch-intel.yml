name: Fetch Threat Intel

on:
  schedule:
    - cron: '0 */6 * * *' # 00:00, 06:00, 12:00, 18:00 UTC — 4x/day
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: fetch-intel
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run fetch-intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-intel.mjs

      - name: Commit updated feed if changed
        run: |
          git config user.name "tip-bot"
          git config user.email "tip-bot@users.noreply.github.com"
          git add js/autofeed.js js/autofeed-huntlab.js js/autofeed-adversary.js js/autofeed-darkweb.js js/autofeed-connectors.js js/autofeed-tweetfeed.js
          if git diff --cached --quiet; then
            echo "No new items — nothing to commit."
          else
            git commit -m "chore: auto-fetch threat intel $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
